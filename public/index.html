<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager — Fiddler Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-content">
        <div class="logo">
          <div class="logo-icon">&#9881;</div>
          <div>
            <h1>Task Manager</h1>
            <p class="subtitle">Fiddler Interview Demo</p>
          </div>
        </div>
        <div class="header-actions">
          <button class="btn btn-outline" id="healthBtn">Health Check</button>
          <button class="btn btn-outline" id="slowBtn">Slow Request (2s)</button>
        </div>
      </div>
    </header>

    <!-- Stats Cards -->
    <section class="stats" id="statsContainer">
      <div class="stat-card">
        <div class="stat-number" id="statTotal">0</div>
        <div class="stat-label">Total Tasks</div>
      </div>
      <div class="stat-card stat-completed">
        <div class="stat-number" id="statCompleted">0</div>
        <div class="stat-label">Completed</div>
      </div>
      <div class="stat-card stat-progress">
        <div class="stat-number" id="statInProgress">0</div>
        <div class="stat-label">In Progress</div>
      </div>
      <div class="stat-card stat-pending">
        <div class="stat-number" id="statPending">0</div>
        <div class="stat-label">Pending</div>
      </div>
    </section>

    <!-- Main Content -->
    <main class="main">
      <!-- Add Task Form -->
      <div class="card form-card">
        <h2>Add New Task</h2>
        <form id="taskForm">
          <div class="form-row">
            <div class="form-group flex-2">
              <label for="title">Title</label>
              <input type="text" id="title" placeholder="Enter task title..." required>
            </div>
            <div class="form-group flex-1">
              <label for="priority">Priority</label>
              <select id="priority">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="description">Description</label>
            <input type="text" id="description" placeholder="Enter description (optional)">
          </div>
          <button type="submit" class="btn btn-primary">+ Add Task</button>
        </form>
      </div>

      <!-- Filter Bar -->
      <div class="filter-bar">
        <h2>Tasks</h2>
        <div class="filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="pending">Pending</button>
          <button class="filter-btn" data-filter="in-progress">In Progress</button>
          <button class="filter-btn" data-filter="completed">Completed</button>
        </div>
      </div>

      <!-- Task List -->
      <div class="task-list" id="taskList">
        <div class="loading">Loading tasks...</div>
      </div>
    </main>

    <!-- Request Log Panel -->
    <aside class="log-panel">
      <div class="log-header">
        <h3>HTTP Request Log</h3>
        <button class="btn btn-sm" id="clearLog">Clear</button>
      </div>
      <div class="log-hint">Open Fiddler to see full details of each request below!</div>
      <div class="log-list" id="logList"></div>
    </aside>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
